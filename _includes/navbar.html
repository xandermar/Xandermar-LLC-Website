<!-- Navbar -->
<nav class="navbar sticky-top navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container">
        <button class="navbar-toggler ms-auto" type="button" data-nav-toggle="collapse" data-nav-target="#navbarNav"
            aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse justify-content-center" id="navbarNav">
            <ul class="navbar-nav w-100 justify-content-center text-uppercase">
                {% assign nav_pages = site.pages | sort: 'nav_order' %}
                {% for page in nav_pages %}
                {% if page.nav_exclude != true and page.title %}
                <li class="nav-item">
                    <a class="nav-link text-center {% if page.url == page.url %}active{% endif %}"
                        href="{{ page.url | relative_url }}">
                        {{ page.title }}
                    </a>
                </li>
                {% endif %}
                {% endfor %}
            </ul>
        </div>
    </div>
</nav>
