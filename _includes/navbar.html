<!-- Navbar -->
<nav class="navbar sticky-top navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand" href="{{ '/' | relative_url }}">{% include logo.html %} {{ site.title }}</a>
        <span class="navbar-text d-none d-lg-inline">
            <em>{{ site.slogan }}</em>
        </span>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
            aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                {% assign nav_pages = site.pages | sort: 'nav_order' %}
                {% for page in nav_pages %}
                {% if page.nav_exclude != true and page.title %}
                <li class="nav-item">
                    <a class="nav-link {% if page.url == page.url %}active{% endif %}"
                        href="{{ page.url | relative_url }}">
                        {{ page.title }}
                    </a>
                </li>
                {% endif %}
                {% endfor %}
            </ul>
        </div>
    </div>
</nav>
