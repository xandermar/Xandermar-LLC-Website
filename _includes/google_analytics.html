{% if jekyll.environment == "production" %}
<!-- Google Analytics -->
<script>
  (function () {
    var measurementId = 'G-9FZC9PMRBR';
    var loaded = false;

    window.dataLayer = window.dataLayer || [];
    window.gtag = window.gtag || function(){dataLayer.push(arguments);};

    function loadAnalytics() {
      if (loaded) {
        return;
      }
      loaded = true;

      var script = document.createElement('script');
      script.async = true;
      script.src = 'https://www.googletagmanager.com/gtag/js?id=' + measurementId;
      document.head.appendChild(script);

      gtag('js', new Date());
      gtag('config', measurementId);
    }

    function scheduleAnalytics() {
      if ('requestIdleCallback' in window) {
        requestIdleCallback(loadAnalytics, { timeout: 5000 });
      } else {
        setTimeout(loadAnalytics, 5000);
      }
    }

    window.addEventListener('load', scheduleAnalytics, { once: true });
    window.addEventListener('pointerdown', loadAnalytics, { once: true, passive: true });
    window.addEventListener('keydown', loadAnalytics, { once: true });
    window.addEventListener('touchstart', loadAnalytics, { once: true, passive: true });
  })();
</script>
<!-- End Google Analytics -->
    {% else %}
<!-- Google Analytics is disabled in non-production environments -->
{% endif %}
