<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>{{ page.title | default: site.title }}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Optional: Your custom stylesheet -->
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
    <link rel="stylesheet" href="{{ '/assets/css/icons.css' | relative_url }}">


    <link rel="apple-touch-icon" sizes="180x180" href="/assets/favicon/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/assets/favicon/favicon-16x16.png">
    <link rel="manifest" href="/assets/favicon/site.webmanifest">
    <link rel="mask-icon" href="/assets/favicon/safari-pinned-tab.svg" color="#5bbad5">
    <meta name="msapplication-TileColor" content="#da532c">
    <meta name="theme-color" content="#ffffff">
    {% include google_analytics.html %}

  </head>

  <body class="d-flex flex-column min-vh-100">

    {% include header.md %}

    <!-- Navbar -->
    {% include navbar.html %}

    <!-- Main content and sidebar -->
    <div class="container flex-grow-1">
      <div class="row">

        <!-- Main Content -->
        <div class="col-lg-12">
          <main>
            {% if title %}
              <h2>{{ title }}</h2>
            {% endif %}
            {{ content }}

            {% if page.categories %}
              <div class="mt-4">
                <hr><h5>Categories:</h5>
                <ul class="list-inline">
                  {% for category in page.categories %}
                    <li class="list-inline-item">
                      <a href="{{ '/category/' | append: category | append: '/' | relative_url }}" class="badge bg-secondary text-decoration-none">
                        {{ category }}
                      </a>
                    </li>
                  {% endfor %}
                </ul>
              </div>
            {% endif %}

          </main>
        </div>


      </div>
    </div>

    <!-- Back to Top Button -->
    <a href="#" class="btn btn-primary position-fixed bottom-0 end-0 m-4 back-to-top-button">
      <span class="xi-next xi-16 xi-white xi-inline xi-up" aria-hidden="true"></span> Top
    </a>

    <!-- Sticky Footer -->
    {% include footer.html %}

    <!-- Bootstrap 5 JS Bundle (includes Popper) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script src="{{ '/assets/js/main.js' | relative_url }}"></script>

  </body>
</html>
